<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gawynt OS | 2026 Edition</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(28, 28, 30, 0.6);
            --text-main: #f5f5f7;
            --text-sub: #a1a1a6;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            --glass-blur: blur(25px) saturate(200%);
            --accent: #007aff;
        }

        [data-theme="light"] {
            --bg-color: #f0f0f2;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-main: #1d1d1f;
            --text-sub: #6e6e73;
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 40px 100px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        #snow-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .theme-switch {
            position: absolute; top: 30px; right: 30px; z-index: 100;
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 50px; cursor: pointer;
            backdrop-filter: var(--glass-blur); font-size: 13px; font-weight: 600;
            color: var(--text-main); display: flex; align-items: center; gap: 8px;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 48px;
            padding: 56px 36px;
            width: 92%; max-width: 440px;
            text-align: center; box-shadow: var(--shadow);
            z-index: 10; position: relative;
            animation: cardEntrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-size: 44px; font-weight: 800; letter-spacing: -1.5px;
            background: linear-gradient(180deg, var(--text-main) 30%, var(--text-sub) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .version-badge {
            font-size: 11px; font-weight: 700; letter-spacing: 2px;
            color: var(--accent); text-transform: uppercase; margin-bottom: 36px;
            display: block; opacity: 0.8;
        }

        .btn-stack {
            display: flex; flex-direction: column; gap: 12px;
            max-height: 420px; overflow-y: auto; padding: 10px 12px;
            mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
        }

        .btn-stack::-webkit-scrollbar { width: 0px; }

        .btn {
            position: relative; text-decoration: none; padding: 20px 24px;
            border-radius: 22px; font-weight: 600; font-size: 17px; color: #fff;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden;
        }

        .btn:hover { transform: scale(1.04) translateY(-4px); z-index: 2; box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .btn:active { transform: scale(0.98); }

        /* Gradients */
        .btn-snow { background: linear-gradient(135deg, #007AFF, #5856D6); }
        .btn-candy { background: linear-gradient(135deg, #FF2D55, #FF375F); }
        .btn-calc { background: linear-gradient(135deg, #8E8E93, #2C2C2E); }
        .btn-neon { background: linear-gradient(135deg, #FFD60A, #FF9F0A); color: #000; }
        .btn-bird { background: linear-gradient(135deg, #30D5C8, #32D74B); }
        .btn-car { background: linear-gradient(135deg, #48484A, #000000); }
        .btn-run { background: linear-gradient(135deg, #0A84FF, #0040DD); }
        .btn-fruit { background: linear-gradient(135deg, #32D74B, #248A3D); }
        .btn-music { background: linear-gradient(135deg, #AF52DE, #BF5AF2); }
        .btn-alarm { background: linear-gradient(135deg, #FF3B30, #5856D6); }
        
        /* New Maze Button with Pulse Animation */
        .btn-maze { 
            background: linear-gradient(135deg, #1d1d1f, #00C7BE); 
            border: 1px solid #00C7BE;
            animation: mazeGlow 3s infinite alternate;
        }

        @keyframes mazeGlow {
            0% { box-shadow: 0 0 5px rgba(0, 199, 190, 0.2); }
            100% { box-shadow: 0 0 20px rgba(0, 199, 190, 0.5); }
        }

        .btn i { font-style: normal; font-size: 20px; opacity: 0.5; transition: 0.4s; }
        .btn:hover i { transform: translateX(6px); opacity: 1; }

        .system-info {
            margin-top: 36px; font-size: 12px; font-weight: 500;
            color: var(--text-sub); display: flex; justify-content: center; align-items: center; gap: 12px;
        }

        .status-dot {
            width: 8px; height: 8px; background: #34c759; border-radius: 50%;
            box-shadow: 0 0 15px #34c759; animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body data-theme="dark">

    <canvas id="snow-canvas"></canvas>

    <button class="theme-switch" onclick="toggleTheme()">
        <span id="mode-icon">☀️</span> <span id="mode-text">Light Mode</span>
    </button>

    <div class="glass-card" id="mainCard">
        <div class="logo-mark"></div>
        <h1>GAWYNT</h1>
        <span class="version-badge">Quantum Hub v2.6.4</span>

        <div class="btn-stack">
            <a href="https://Gawyntgg.github.io/Gawynt-Snow-shoveling/" class="btn btn-snow" onclick="createBurst(event)">
                <span>❄️ Snow Shoveling</span><i>→</i>
            </a>
            <a href="https://Gawyntgg.github.io/GS-Candy/" class="btn btn-candy" onclick="createBurst(event)">
                <span>🍭 GS-Candy</span><i>→</i>
            </a>
            <a href="https://gawyntgg.github.io/Calculator-/" class="btn btn-calc" onclick="createBurst(event)">
                <span>🔢 Calculator</span><i>→</i>
            </a>
            <a href="https://gawyntgg.github.io/Neon-Runner/" class="btn btn-neon" onclick="createBurst(event)">
                <span>⚡ Neon Runner</span><i>→</i>
            </a>
            <a href="https://Gawyntgg.github.io/Flappy-bird/" class="btn btn-bird" onclick="createBurst(event)">
                <span>🐦 Flappy Bird</span><i>→</i>
            </a>
            <a href="https://gawyntgg.github.io/Car/" class="btn btn-car" onclick="createBurst(event)">
                <span>🚗 Car Game</span><i>→</i>
            </a>
            <a href="https://Gawyntgg.github.io/Run/" class="btn btn-run" onclick="createBurst(event)">
                <span>🏃 Run Game</span><i>→</i>
            </a>
            <a href="https://Gawyntgg.github.io/Fruit/" class="btn btn-fruit" onclick="createBurst(event)">
                <span>🍎 Fruit Game</span><i>→</i>
            </a>
            <a href="https://Gawyntgg.github.io/Music/" class="btn btn-music" onclick="createBurst(event)">
                <span>🎵 Music Hub</span><i>→</i>
            </a>
            <a href="https://Gawyntgg.github.io/Alarmy/" class="btn btn-alarm" onclick="createBurst(event)">
                <span>⏰ Alarmy</span><i>→</i>
            </a>
            <a href="https://Gawyntgg.github.io/Maze/" class="btn btn-maze" onclick="createBurst(event)">
                <span>🧩 Digital Maze</span><i>→</i>
            </a>
        </div>

        <div class="system-info">
            <span style="display:flex; align-items:center; gap:6px;"><div class="status-dot"></div> Hub Online</span>
            <span>•</span>
            <span>Calgary Tech</span>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('mode-text').innerText = isDark ? "Dark Mode" : "Light Mode";
            document.getElementById('mode-icon').innerText = isDark ? "🌙" : "☀️";
        }

        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let bursts = [];

        function initSnow() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 0.5,
                    vx: (Math.random() - 0.5) * 1,
                    vy: Math.random() * 1.5 + 0.5
                });
            }
        }

        // Feature: Burst Effect on Click
        function createBurst(e) {
            for(let i=0; i<15; i++) {
                bursts.push({
                    x: e.clientX,
                    y: e.clientY,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0,
                    color: '#00C7BE'
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const theme = document.body.getAttribute('data-theme');
            ctx.fillStyle = theme === 'dark' ? "rgba(255, 255, 255, 0.4)" : "rgba(0, 0, 0, 0.1)";
            
            // Snow
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                p.y += p.vy; p.x += p.vx;
                if (p.y > canvas.height) p.y = -10;
            }

            // Burst Particles
            for (let i = bursts.length - 1; i >= 0; i--) {
                let b = bursts[i];
                ctx.fillStyle = `rgba(0, 199, 190, ${b.life})`;
                ctx.beginPath();
                ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
                ctx.fill();
                b.x += b.vx; b.y += b.vy;
                b.life -= 0.02;
                if(b.life <= 0) bursts.splice(i, 1);
            }
            requestAnimationFrame(draw);
        }

        const card = document.getElementById('mainCard');
        document.addEventListener('mousemove', (e) => {
            const rotateX = (window.innerHeight / 2 - e.pageY) / 30;
            const rotateY = (e.pageX - window.innerWidth / 2) / 30;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        window.addEventListener('resize', initSnow);
        initSnow();
        draw();
    </script>
</body>
</html>
