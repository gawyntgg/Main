<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gawynt OS | 2026 Edition</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(28, 28, 30, 0.7);
            --text-main: #f5f5f7;
            --text-sub: #a1a1a6;
            --border: rgba(255, 255, 255, 0.12);
            --shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            --glass-blur: blur(25px) saturate(180%);
        }

        [data-theme="light"] {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1d1d1f;
            --text-sub: #6e6e73;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 40px 100px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .theme-switch {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: var(--glass-blur);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .theme-switch:hover {
            transform: translateY(-2px);
            background: var(--border);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 44px;
            padding: 48px 32px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: var(--shadow);
            z-index: 10;
            position: relative;
            animation: cardLoad 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            perspective: 1000px;
        }

        @keyframes cardLoad {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-mark {
            font-size: 44px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 4px;
            background: linear-gradient(180deg, var(--text-main) 0%, var(--text-sub) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version-badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 32px;
            display: block;
            opacity: 0.7;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 380px;
            overflow-y: auto;
            padding: 4px 8px;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        .btn-stack::-webkit-scrollbar { width: 0px; }

        .btn {
            position: relative;
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 16px;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn:hover {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
            filter: brightness(1.1);
        }

        /* Modern Gradient Library */
        .btn-snow { background: linear-gradient(135deg, #007AFF, #00C7BE); }
        .btn-candy { background: linear-gradient(135deg, #FF2D55, #FF3B30); }
        .btn-calc { background: linear-gradient(135deg, #5856D6, #AF52DE); }
        .btn-neon { background: linear-gradient(135deg, #FF9500, #FFCC00); color: #000; }
        .btn-bird { background: linear-gradient(135deg, #30B0C7, #34C759); }
        .btn-car { background: linear-gradient(135deg, #48484A, #1C1C1E); }
        .btn-run { background: linear-gradient(135deg, #0040DD, #007AFF); }
        .btn-rock { background: linear-gradient(135deg, #8E8E93, #636366); }
        .btn-fruit { background: linear-gradient(135deg, #34C759, #32D74B); color: #003e21; }
        .btn-music { background: linear-gradient(135deg, #BF5AF2, #FF2D55); border: 1px solid rgba(255,255,255,0.2); }
        /* New Alarmy Button Style */
        .btn-alarm { background: linear-gradient(135deg, #1D1D1F, #434343); border: 1px solid rgba(255,255,255,0.15); }

        .btn span { display: flex; align-items: center; gap: 12px; }
        .btn i { font-style: normal; font-size: 18px; opacity: 0.6; transition: 0.3s; }
        .btn:hover i { transform: translateX(4px); opacity: 1; }

        .system-info {
            margin-top: 32px;
            font-size: 11px;
            color: var(--text-sub);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            box-shadow: 0 0 12px #34c759;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body data-theme="dark">

    <canvas id="snow-canvas"></canvas>

    <button class="theme-switch" onclick="toggleTheme()">
        <span id="mode-icon">☀️</span> <span id="mode-text">Light Mode</span>
    </button>

    <div class="glass-card" id="mainCard">
        <div class="logo-mark"></div>
        <h1>GAWYNT</h1>
        <span class="version-badge">Quantum Hub v2.6.4</span>

        <div class="btn-stack">
            <a href="https://Gawyntgg.github.io/Alarmy/" class="btn btn-alarm">
                <span>⏰ Alarmy</span>
                <i>→</i>
            </a>

            <a href="https://Gawyntgg.github.io/Gawynt-Snow-shoveling/" class="btn btn-snow">
                <span>❄️ Snow Shoveling</span>
                <i>→</i>
            </a>
            
            <a href="https://Gawyntgg.github.io/GS-Candy/" class="btn btn-candy">
                <span>🍭 GS-Candy</span>
                <i>→</i>
            </a>

            <a href="https://gawyntgg.github.io/Calculator-/" class="btn btn-calc">
                <span>🔢 Calculator</span>
                <i>→</i>
            </a>

            <a href="https://gawyntgg.github.io/Neon-Runner/" class="btn btn-neon">
                <span>⚡ Neon Runner</span>
                <i>→</i>
            </a>

            <a href="https://Gawyntgg.github.io/Flappy-bird/" class="btn btn-bird">
                <span>🐦 Flappy Bird</span>
                <i>→</i>
            </a>

            <a href="https://gawyntgg.github.io/Car/" class="btn btn-car">
                <span>🚗 Car Game</span>
                <i>→</i>
            </a>

            <a href="https://Gawyntgg.github.io/Run/" class="btn btn-run">
                <span>🏃 Run Game</span>
                <i>→</i>
            </a>

            <a href="https://gawyntgg.github.io/Rock/" class="btn btn-rock">
                <span>🪨 Rock Game</span>
                <i>→</i>
            </a>

            <a href="https://Gawyntgg.github.io/Fruit/" class="btn btn-fruit">
                <span>🍎 Fruit Game</span>
                <i>→</i>
            </a>

            <a href="https://Gawyntgg.github.io/Music/" class="btn btn-music">
                <span>🎵 Music Hub</span>
                <i>→</i>
            </a>
        </div>

        <div class="system-info">
            <span style="display:flex; align-items:center; gap:6px;"><div class="status-dot"></div> Systems Nominal</span>
            <span>•</span>
            <span>Uptime: 100%</span>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const modeText = document.getElementById('mode-text');
            const modeIcon = document.getElementById('mode-icon');
            const isDark = body.getAttribute('data-theme') === 'dark';
            
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            modeText.innerText = isDark ? "Dark Mode" : "Light Mode";
            modeIcon.innerText = isDark ? "🌙" : "☀️";
        }

        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initSnow() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 120; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 0.5,
                    velocity: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.5 + 0.3
                });
            }
        }

        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const theme = document.body.getAttribute('data-theme');
            ctx.fillStyle = theme === 'dark' ? "rgba(255, 255, 255, 0.4)" : "rgba(0, 0, 0, 0.1)";
            
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            updateSnow();
        }

        function updateSnow() {
            for (let p of particles) {
                p.y += p.velocity;
                if (p.y > canvas.height) {
                    p.y = -10;
                    p.x = Math.random() * canvas.width;
                }
            }
        }

        function animate() {
            drawSnow();
            requestAnimationFrame(animate);
        }

        const card = document.getElementById('mainCard');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 35;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 35;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });

        window.addEventListener('resize', initSnow);
        initSnow();
        animate();
    </script>
</body>
</html>
