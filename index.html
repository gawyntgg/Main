<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gawynt OS | 2026 Edition</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(28, 28, 30, 0.6);
            --text-main: #f5f5f7;
            --text-sub: #a1a1a6;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            --glass-blur: blur(25px) saturate(200%);
            --accent: #007aff;
        }

        [data-theme="light"] {
            --bg-color: #f0f0f2;
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-main: #1d1d1f;
            --text-sub: #6e6e73;
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 40px 100px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .theme-switch {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: var(--glass-blur);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .theme-switch:hover {
            transform: scale(1.05);
            background: var(--border);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 48px;
            padding: 56px 36px;
            width: 92%;
            max-width: 440px;
            text-align: center;
            box-shadow: var(--shadow);
            z-index: 10;
            position: relative;
            animation: cardEntrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(40px) rotateX(-10deg); }
            to { opacity: 1; transform: scale(1) translateY(0) rotateX(0); }
        }

        .logo-mark {
            font-size: 48px;
            margin-bottom: 12px;
            display: inline-block;
            transition: transform 0.6s ease;
        }
        
        .glass-card:hover .logo-mark {
            transform: rotateY(180deg);
        }

        h1 {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 4px;
            background: linear-gradient(180deg, var(--text-main) 30%, var(--text-sub) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version-badge {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 36px;
            display: block;
            opacity: 0.8;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px 12px;
            scroll-behavior: smooth;
            mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
        }

        .btn-stack::-webkit-scrollbar { width: 0px; }

        .btn {
            position: relative;
            text-decoration: none;
            padding: 20px 24px;
            border-radius: 22px;
            font-weight: 600;
            font-size: 17px;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .btn:hover::before { left: 100%; }

        .btn:hover {
            transform: scale(1.04) translateY(-4px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Gradient Palette */
        .btn-snow { background: linear-gradient(135deg, #007AFF, #5856D6); }
        .btn-candy { background: linear-gradient(135deg, #FF2D55, #FF375F); }
        .btn-calc { background: linear-gradient(135deg, #8E8E93, #2C2C2E); }
        .btn-neon { background: linear-gradient(135deg, #FFD60A, #FF9F0A); color: #000; }
        .btn-bird { background: linear-gradient(135deg, #30D5C8, #32D74B); }
        .btn-car { background: linear-gradient(135deg, #48484A, #000000); }
        .btn-run { background: linear-gradient(135deg, #0A84FF, #0040DD); }
        .btn-rock { background: linear-gradient(135deg, #636366, #1C1C1E); }
        .btn-fruit { background: linear-gradient(135deg, #32D74B, #248A3D); }
        .btn-music { background: linear-gradient(135deg, #AF52DE, #BF5AF2); }
        .btn-alarm { background: linear-gradient(135deg, #FF3B30, #5856D6); }

        .btn i { font-style: normal; font-size: 20px; opacity: 0.5; transition: 0.4s; }
        .btn:hover i { transform: translateX(6px); opacity: 1; }

        .system-info {
            margin-top: 36px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-sub);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            box-shadow: 0 0 15px #34c759;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
    </style>
</head>
<body data-theme="dark">

    <canvas id="snow-canvas"></canvas>

    <button class="theme-switch" onclick="toggleTheme()">
        <span id="mode-icon">☀️</span> <span id="mode-text">Light Mode</span>
    </button>

    <div class="glass-card" id="mainCard">
        <div class="logo-mark"></div>
        <h1>GAWYNT</h1>
        <span class="version-badge">Quantum Hub v2.6.4</span>

        <div class="btn-stack">
            <a href="https://Gawyntgg.github.io/Gawynt-Snow-shoveling/" class="btn btn-snow">
                <span>❄️ Snow Shoveling</span>
                <i>→</i>
            </a>
            
            <a href="https://Gawyntgg.github.io/GS-Candy/" class="btn btn-candy">
                <span>🍭 GS-Candy</span>
                <i>→</i>
            </a>

            <a href="https://gawyntgg.github.io/Calculator-/" class="btn btn-calc">
                <span>🔢 Calculator</span>
                <i>→</i>
            </a>

            <a href="https://gawyntgg.github.io/Neon-Runner/" class="btn btn-neon">
                <span>⚡ Neon Runner</span>
                <i>→</i>
            </a>

            <a href="https://Gawyntgg.github.io/Flappy-bird/" class="btn btn-bird">
                <span>🐦 Flappy Bird</span>
                <i>→</i>
            </a>

            <a href="https://gawyntgg.github.io/Car/" class="btn btn-car">
                <span>🚗 Car Game</span>
                <i>→</i>
            </a>

            <a href="https://Gawyntgg.github.io/Run/" class="btn btn-run">
                <span>🏃 Run Game</span>
                <i>→</i>
            </a>

            <a href="https://gawyntgg.github.io/Rock/" class="btn btn-rock">
                <span>🪨 Rock Game</span>
                <i>→</i>
            </a>

            <a href="https://Gawyntgg.github.io/Fruit/" class="btn btn-fruit">
                <span>🍎 Fruit Game</span>
                <i>→</i>
            </a>

            <a href="https://Gawyntgg.github.io/Music/" class="btn btn-music">
                <span>🎵 Music Hub</span>
                <i>→</i>
            </a>

            <a href="https://Gawyntgg.github.io/Alarmy/" class="btn btn-alarm">
                <span>⏰ Alarmy</span>
                <i>→</i>
            </a>
        </div>

        <div class="system-info">
            <span style="display:flex; align-items:center; gap:6px;"><div class="status-dot"></div> Core Active</span>
            <span>•</span>
            <span>Calgary, AB</span>
        </div>
    </div>

    <script>
        // Smooth Theme Toggle
        function toggleTheme() {
            const body = document.body;
            const modeText = document.getElementById('mode-text');
            const modeIcon = document.getElementById('mode-icon');
            const isDark = body.getAttribute('data-theme') === 'dark';
            
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            modeText.innerText = isDark ? "Dark Mode" : "Light Mode";
            modeIcon.innerText = isDark ? "🌙" : "☀️";
        }

        // Advanced Interactive Snow
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -100, y: -100 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function initSnow() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 0.5,
                    vx: (Math.random() - 0.5) * 1,
                    vy: Math.random() * 1.5 + 0.5,
                    o: Math.random() * 0.5 + 0.2
                });
            }
        }

        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const theme = document.body.getAttribute('data-theme');
            ctx.fillStyle = theme === 'dark' ? "rgba(255, 255, 255, 0.4)" : "rgba(0, 0, 0, 0.1)";
            
            for (let p of particles) {
                // Interaction Logic
                let dx = mouse.x - p.x;
                let dy = mouse.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 100) {
                    p.x -= dx/20;
                    p.y -= dy/20;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                p.y += p.vy;
                p.x += p.vx;

                if (p.y > canvas.height) p.y = -10;
                if (p.x > canvas.width) p.x = 0;
                if (p.x < 0) p.x = canvas.width;
            }
            requestAnimationFrame(drawSnow);
        }

        // Parallax Effect
        const card = document.getElementById('mainCard');
        document.addEventListener('mousemove', (e) => {
            const rotateX = (window.innerHeight / 2 - e.pageY) / 30;
            const rotateY = (e.pageX - window.innerWidth / 2) / 30;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        window.addEventListener('resize', initSnow);
        initSnow();
        drawSnow();
    </script>
</body>
</html>
